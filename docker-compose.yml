services:
  neirobridge-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neirobridge-site
    restart: unless-stopped
    environment:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      LEAD_TO_EMAIL: ${LEAD_TO_EMAIL:-}
    expose:
      - "3000"
    networks:
      - stack_default

networks:
  stack_default:
    external: true
