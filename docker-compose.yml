services:
  neirobridge-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neirobridge-site
    restart: unless-stopped
    environment:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      LEAD_TO_EMAIL: ${LEAD_TO_EMAIL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.proxyapi.ru/openai/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      RAG_SCORE_THRESHOLD: ${RAG_SCORE_THRESHOLD:-0.38}
    expose:
      - "3000"
    networks:
      - stack_default

networks:
  stack_default:
    external: true
